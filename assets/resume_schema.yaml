# YAML Schema for plain_text_resume.yaml
# Matches the Resume model in src/resume_schemas/resume.py

personal_information:
  type: object
  properties:
    name: {type: string}
    surname: {type: string}
    date_of_birth: {type: string}
    country: {type: string}
    city: {type: string}
    address: {type: string}
    zip_code: {type: string}
    phone_prefix: {type: string}
    phone: {type: string}
    email: {type: string}
    github: {type: string}
    linkedin: {type: string}

education_details:
  type: array
  items:
    type: object
    properties:
      education_level: {type: string}
      institution: {type: string}
      field_of_study: {type: string}
      final_evaluation_grade: {type: string}
      start_date: {type: string}
      year_of_completion: {type: integer}
      location: {type: string}
      country: {type: string}

experience_details:
  type: array
  items:
    type: object
    properties:
      position: {type: string}
      company: {type: string}
      employment_period: {type: string}
      location: {type: string}
      industry: {type: string}
      key_responsibilities:
        type: array
        items:
          type: object
          properties:
            responsibility: {type: string}
      skills_acquired:
        type: array
        items: {type: string}

projects:
  type: array
  items:
    type: object
    properties:
      name: {type: string}
      description: {type: string}
      link: {type: string}

achievements:
  type: array
  items:
    type: object
    properties:
      name: {type: string}
      description: {type: string}

certifications:
  type: array
  items:
    type: object
    properties:
      name: {type: string}
      description: {type: string}

languages:
  type: array
  items:
    type: object
    properties:
      language: {type: string}
      proficiency: {type: string}

interests:
  type: array
  items: {type: string}
