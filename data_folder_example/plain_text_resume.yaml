# ============================================================================
# plain_text_resume.yaml  —  COMPLETE FIELD REFERENCE
# ----------------------------------------------------------------------------
# This file is the SINGLE input file for your resume content.
# All fields below are OPTIONAL. Include only what is relevant to you:
#   - omit a section/field entirely, or
#   - comment it out (prefix the line with '#'), or
#   - set it to an empty string "" or to null.
# The software adapts to whatever you provide: missing sections are left out
# of the generated resume, and unrecognized fields are safely ignored.
#
# NOTE: use `interests` (not `additional_skills`) for the list of extra
# skills/interests below. `additional_skills` is only a layout keyword used
# in `data_folder/options.yaml` to control the rendered "Additional Skills"
# section (which is built from each experience's `skills_acquired`).
# ============================================================================

personal_information:
  name: "John"                            # First name
  surname: "Doe"                          # Last name
  date_of_birth: "01/01/1990"             # Date of birth, DD/MM/YYYY
  country: "United States"                # Country of residence
  city: "New York"                        # City of residence
  zip_code: "10001"                       # Postal/zip code (5-10 characters)
  address: "123 Main St"                  # Street address (optional)
  phone_prefix: "+1"                      # Country calling code, include '+'
  phone: "5551234567"                     # Phone number, no spaces or dashes
  email: "john.doe@example.com"           # Valid email address
  github: "https://github.com/johndoe"    # Full URL to GitHub profile
  linkedin: "https://www.linkedin.com/in/johndoe/"  # Full URL to LinkedIn profile

education_details:                        # List of degrees / certifications
  - education_level: "Bachelor's Degree"  # Type of degree or certification
    institution: "University Name"        # School, college, or university
    field_of_study: "Computer Science"    # Major or area of study
    final_evaluation_grade: "3.8 GPA"     # Final grade or GPA
    start_date: "2016"                    # Year you started
    year_of_completion: 2020              # Year you completed (number)
    location: "New York, NY"              # Institution location (optional)
    country: "United States"              # Institution country (optional)

experience_details:                       # List of work experiences
  - position: "Software Engineer"         # Your job title
    company: "Tech Company Inc."          # Company name
    employment_period: "06/2020 - Present" # Period, MM/YYYY - MM/YYYY
    location: "New York, NY"              # Job location
    industry: "Technology"                # Industry sector
    key_responsibilities:                 # List of responsibilities
      - responsibility: "Developed web applications using React and Node.js"
      - responsibility: "Collaborated with cross-functional teams"
      # A plain string also works:
      # - "Troubleshot and resolved complex software issues"
    skills_acquired:                      # Skills gained/used in this role
      - "React"
      - "Node.js"
      - "Team Collaboration"

projects:                                 # List of projects (optional)
  - name: "E-commerce Platform"           # Project name
    description: "Built a full-stack e-commerce platform with React and Node.js"
    link: "https://github.com/johndoe/ecommerce"  # Link to project (optional)

achievements:                             # Notable accomplishments (optional)
  - name: "Hackathon Winner"              # Achievement name
    description: "Won first place in a national coding competition"

certifications:                           # Professional certifications (optional)
  - name: "AWS Certified Solutions Architect"  # Certification name
    description: "Professional certification for AWS architecture"

languages:                                # Languages you speak (optional)
  - language: "English"                   # Language name
    proficiency: "Native"                 # Proficiency level

interests:                                # Extra skills / interests (optional)
  - "JavaScript"
  - "Python"
  - "Problem Solving"
  - "Communication"
